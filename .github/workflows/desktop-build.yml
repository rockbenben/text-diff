name: Build Desktop App

# Manual run, or push a tag like `v3.0.0`.
# Produces signed installers for Windows / macOS / Linux and a DRAFT GitHub
# Release with the updater manifest (latest.json) attached. Publish the draft
# (un-draft it) to actually roll the update out to existing installs — the
# updater endpoint resolves `releases/latest`, which ignores drafts.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon (M1+)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      # 应用代码在 feat/tauri-desktop 分支,所以这里显式 checkout 该分支。
      # 注意:此处固定了分支名;若将来该分支合并/改名,需同步更新下面的 ref。
      - uses: actions/checkout@v6
        with:
          ref: feat/tauri-desktop

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev wget file

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: |
          yarn update-version
          yarn install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # tauri-action replaces __VERSION__ with the app version
          releaseName: "Text Diff v__VERSION__"
          releaseBody: |
            Text Diff desktop — compare two texts or files side by side and see every change highlighted. Runs fully offline; remembers your language and window layout.

            **Pick the right file for your system:**
            - **Windows (installer)**: `-setup.exe` (NSIS, recommended) or `.msi`.
            - **Windows (portable)**: `TextDiff_<version>_portable.exe` — no install, just run (needs the WebView2 runtime, preinstalled on Win 11 / current Win 10).
            - **macOS (Apple Silicon · M1/M2/M3)**: the `aarch64.dmg`.
            - **macOS (Intel)**: the `x64.dmg`.
            - **Linux**: `.AppImage` (portable), `.deb` (Debian/Ubuntu), or `.rpm` (Fedora/RHEL).

            🔄 **Auto-update**: installed apps download new versions in the background and prompt you to install — no need to revisit this page.

            ---

            Text Diff 桌面版 —— 并排对比两段文本或文件，逐处高亮差异。完全离线运行，自动记住语言与窗口布局。

            **按系统选择对应文件：**
            - **Windows（安装版）**：`-setup.exe`（NSIS，推荐）或 `.msi`。
            - **Windows（绿色便携版）**：`TextDiff_<版本>_portable.exe` —— 免安装，双击即用（需 WebView2 运行时，Win 11 / 较新 Win 10 已自带）。
            - **macOS（Apple 芯片 · M1/M2/M3）**：选 `aarch64.dmg`。
            - **macOS（Intel）**：选 `x64.dmg`。
            - **Linux**：`.AppImage`（免安装）、`.deb`（Debian/Ubuntu）或 `.rpm`（Fedora/RHEL）。

            🔄 **自动更新**：已安装的应用会在后台下载新版本并提示安装，无需再回到本页面。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Portable "green" build (Windows only): the raw self-contained exe that
      # tauri builds anyway — no installer, no admin rights, just run it. The web
      # assets are compiled in; the only external dependency is the WebView2
      # runtime (preinstalled on Windows 11 and current Windows 10).
      - name: Stage portable Windows exe
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp "src-tauri/target/release/TextDiff.exe" "TextDiff_${VERSION}_portable.exe"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload portable exe as workflow artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: text-diff-portable-windows
          path: TextDiff_${{ env.APP_VERSION }}_portable.exe
          if-no-files-found: error

      - name: Attach portable exe to the release
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${APP_VERSION}" "TextDiff_${APP_VERSION}_portable.exe" --clobber

name: Build Electron (Windows unpacked)

# 仅手动触发的便捷构建:内网用的 Electron 桌面版。
# 应用代码在 feat/electron-desktop 分支,所以这里显式 checkout 该分支。
# 产物为 win-unpacked 目录(下载时 GitHub 会自动打包成 zip),免解压、启动快。
# 注意:此处固定了分支名;若将来该分支合并/改名,需同步更新下面的 ref。
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/electron-desktop

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run electron unit tests
        run: yarn test:electron

      - name: Build unpacked app
        run: yarn electron:build

      - name: Upload unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextDiff-unpacked
          path: dist-electron/win-unpacked
          if-no-files-found: error

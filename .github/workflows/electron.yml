name: Build Electron (Windows unpacked)

# Manual run only — standalone build for testing this branch in isolation.
# Releases are driven from `main` (the release hub): a `v*` tag on main runs
# main's copy of this workflow with `ref: feat/electron-desktop`, builds, and
# uploads the win-unpacked zip to the Tauri-created Release. Tagging this branch
# is therefore intentionally NOT a trigger, and there is no release step here.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # electron@42 requires node >= 22.12
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run electron unit tests
        run: yarn test:electron

      - name: Build unpacked app
        run: yarn electron:build

      - name: Upload unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextDiff-unpacked
          path: dist-electron/win-unpacked
          if-no-files-found: error
